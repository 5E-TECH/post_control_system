name: CI/CD Deploy (Selective Build + Systemd + Cache)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Production

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 3️⃣ Generate GitHub App token
      - name: Setup GitHub App token
        uses: tibdex/github-app-token@v2
        id: generate_token
        with:
          app_id: ${{ secrets.GH_APP_ID }}
          private_key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          repository: 5E-TECH/post_control_system

      # 4️⃣ Determine changed directories (merge-safe version)
      - name: Determine changed directories
        id: changes
        run: |
          git fetch --deepen=50
          # For merge commits, compare both parents to get all changed files
          if git rev-parse HEAD^2 >/dev/null 2>&1; then
            MERGE_BASE=$(git merge-base HEAD^1 HEAD^2)
            CHANGED_DIRS=$(git diff --name-only $MERGE_BASE HEAD | awk -F/ '{print $1}' | sort -u | tr '\n' ' ')
          else
            CHANGED_DIRS=$(git diff --name-only HEAD~1 HEAD | awk -F/ '{print $1}' | sort -u | tr '\n' ' ')
          fi
          echo "changed=$CHANGED_DIRS" >> $GITHUB_OUTPUT
          echo "🧾 Changed directories: $CHANGED_DIRS"

      # 5️⃣ Cache client node_modules
      - name: Cache client node_modules
        if: contains(steps.changes.outputs.changed, 'client')
        uses: actions/cache@v4
        with:
          path: client/node_modules
          key: client-${{ hashFiles('client/package-lock.json') }}
          restore-keys: client-

      # 6️⃣ Cache server node_modules
      - name: Cache server node_modules
        if: contains(steps.changes.outputs.changed, 'server')
        uses: actions/cache@v4
        with:
          path: server/node_modules
          key: server-${{ hashFiles('server/package-lock.json') }}
          restore-keys: server-

      # 7️⃣ Deploy to Production Server
      - name: Deploy to Production Server
        env:
          CHANGED_DIRS: ${{ steps.changes.outputs.changed }}
        run: |
          echo "${{ secrets.SERVER_SSH_KEY }}" > server_key.pem
          chmod 600 server_key.pem

          echo "🚀 Deploying — changed dirs: $CHANGED_DIRS"

          ssh -i server_key.pem -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} "
            set -e

            cd ${{ secrets.APP_PATH }}
            echo '📦 Pulling latest code...'
            git reset --hard
            git pull https://x-access-token:${{ steps.generate_token.outputs.token }}@github.com/5E-TECH/post_control_system.git main

            echo '🧾 Changed directories: $CHANGED_DIRS'

            # ===== Build React frontend if changed =====
            if [[ '$CHANGED_DIRS' == *'client'* ]]; then
              echo '📁 Building frontend...'
              rm -rf client/dist client/build
              cd client
              npm ci --prefer-offline --legacy-peer-deps
              NODE_OPTIONS='--max-old-space-size=1024' npm run build
              sudo rm -rf /var/www/html/*
              sudo cp -r dist/* /var/www/html/
              cd ..
              echo '⚡️ Frontend deployed.'
            fi

            # ===== Build NestJS backend if changed =====
            if [[ '$CHANGED_DIRS' == *'server'* ]]; then
              echo '🧠 Building backend...'
              rm -rf server/dist
              cd server
              npm ci --prefer-offline --legacy-peer-deps
              NODE_OPTIONS='--max-old-space-size=1024' npm run build

              # ----- 🛡️ DB BACKUP (migration oldidan, MAJBURIY) -----
              echo '📦 Pre-migration DB backup...'
              if ! command -v pg_dump >/dev/null; then
                echo '❌ pg_dump topilmadi! sudo apt install -y postgresql-client kerak.'
                exit 1
              fi
              npm run db:backup

              # ----- 🩺 Cashbox invariant — BASELINE (migration oldidan) -----
              # Halt qilmaydi — faqat hozirgi drift-larni snapshot qiladi.
              echo '🩺 Pre-migration cashbox baseline snapshot...'
              npm run db:check-cashbox -- --snapshot=/tmp/cb-pre.json

              # ----- 🧬 Migration ishga tushirish -----
              echo '🧬 Running TypeORM migrations...'
              npm run migration:show || true
              if ! npm run migration:run; then
                echo '❌ Migration XATO. App restart QILINMAYDI. Backupdan tiklash mumkin: server/backups/'
                exit 1
              fi

              # ----- 🩺 Cashbox invariant — COMPARE (migration keyin) -----
              # Yangi drift paydo bo'lsa yoki eski drift kattalashsa — halt.
              echo '🩺 Post-migration cashbox invariant (compare)...'
              if ! npm run db:check-cashbox -- --compare=/tmp/cb-pre.json; then
                echo '❌ POST-MIGRATION INVARIANT FAILED! Yangi drift paydo bo'\''ldi.'
                echo '   App restart QILINMAYDI. Ko'\''rib chiqing: npm run migration:revert yoki backupdan tiklang.'
                exit 1
              fi

              cd ..
            fi

            # ===== Restart backend if needed =====
            if [[ '$CHANGED_DIRS' == *'server'* ]] || [[ '$CHANGED_DIRS' == *'client'* ]]; then
              echo '🔁 Restarting backend systemd service...'
              sudo systemctl restart nestapp.service
              sleep 3
              sudo systemctl status nestapp --no-pager

              # ----- ✅ App ishga tushganini tekshirish -----
              if ! sudo systemctl is-active --quiet nestapp.service; then
                echo '❌ nestapp.service ishga tushmadi!'
                exit 1
              fi
              echo '✅ nestapp.service ishga tushdi.'
            fi

            echo '✅ Deployment completed successfully.'
          "
